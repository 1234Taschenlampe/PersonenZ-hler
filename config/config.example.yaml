cameras:
  camera_1:
    camera_id: camera_1
    device: /dev/video0
    width: 1280
    height: 720
    fps: 30
    role: entrance
    display_name: EINGANG - Kamera 1
    line_start:
    - 160
    - 360
    line_end:
    - 1120
    - 360
    in_positive_side: true
    entry_zone: near
    exit_zone: far
    masks: []
    entry_direction: A_to_B
    exit_direction: B_to_A
  camera_2:
    camera_id: camera_2
    device: /dev/video2
    width: 1280
    height: 720
    fps: 30
    role: exit
    display_name: AUSGANG - Kamera 2
    line_start:
    - 160
    - 360
    line_end:
    - 1120
    - 360
    in_positive_side: true
    entry_zone: near
    exit_zone: far
    masks: []
    entry_direction: none
    exit_direction: B_to_A
model:
  hef_path: models/yolo26m_detection_hailo10h_640.hef
  model_name: YOLO26m COCO Detection HAILO10H (person filter)
  target_model_name: YOLO26m COCO Detection HAILO10H (person filter)
  target_hef_path: models/yolo26m_detection_hailo10h_640.hef
  detector_candidates:
  - name: YOLO26m COCO Detection HAILO10H (person filter)
    path: models/yolo26m_detection_hailo10h_640.hef
    role: required_runtime
  reid_model_name: OSNet x1.0 HAILO10H
  reid_hef_path: models/osnet_x1_0_hailo10h.hef
  reid_required: false
  postprocess_onnx_path: models/yolo26m_postprocessing.onnx
  postprocess_config_path: models/config_onnx_yolo26m.json
  output_format: yolo26_detection
  model_type: Detection
  input_size: 640
  confidence_threshold: 0.2
  iou_threshold: 0.6
  max_detections: 300
  allow_fallback: false
  require_custom_yolo26m: true
  detector_fallback_enabled: false
  custom_target_model_name: YOLO26m COCO Detection HAILO10H (person filter)
  custom_target_hef_path: models/yolo26m_detection_hailo10h_640.hef
  active_detector_policy: Only the official YOLO26m COCO HAILO10H detection HEF
    may run; inference filters COCO class 0 person and missing or invalid HEF disables
    detection and counting.
tracking:
  tracker: bytetrack
  max_lost_frames: 20
  min_hits_before_counting: 2
  iou_match_threshold: 0.2
identity:
  match_window_seconds: 3.0
  stale_seconds: 2.0
  reid_threshold: 0.62
  hysteresis_seconds: 1.5
consensus:
  enabled: true
  transition_window_seconds: 3.0
  uncertain_window_seconds: 6.0
  expected_travel_seconds: 1.5
  bbox_area_ratio_tolerance: 0.7
  event_lock_seconds: 8.0
timeout:
  presence_timeout_enabled: true
  presence_timeout_minutes: 60
database:
  path: data/person_counter.sqlite3
  store_video_frames: false
  store_events: false
  retention_hours: 24
  encryption_required: true
  encryption_key_env: VISITOR_COUNTER_DATA_KEY
  encryption_key_file: ''
display:
  display_raw_frames_only: false
  raw_frame_overlay: true
  show_camera_preview: false
  anonymization_mode: full_frame
  pixel_size: 24
privacy:
  enabled: true
  local_processing_only: true
  telemetry_enabled: false
  video_stream_enabled: false
  remove_stream_frames_on_shutdown: true
  privacy_notice_acknowledged: false
  privacy_notice_acknowledged_at: ''
  legal_basis: ''
  purpose: anonymous occupancy counting
  controller_name: ''
  controller_contact: ''
  consent_required: false
  consent_recorded: false
api:
  enabled: true
  bind_host: 127.0.0.1
  port: 8766
  require_auth: true
  viewer_token_env: VISITOR_COUNTER_VIEWER_TOKEN
  operator_token_env: VISITOR_COUNTER_OPERATOR_TOKEN
  admin_token_env: VISITOR_COUNTER_ADMIN_TOKEN
  minimum_token_length: 32
  tls_certificate: ''
  tls_private_key: ''
  allowed_origins: []
  max_requests_per_minute: 120
  audit_retention_days: 30
